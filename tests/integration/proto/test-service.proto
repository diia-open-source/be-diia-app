syntax = "proto3";

// do not import google protobufs due to extension conflict in the test mode

package ua.gov.diia.test;

option java_multiple_files = true;
option java_package = "ua.gov.diia.test";

service Test {
  rpc GetTest(GetTestReq) returns (GetTestRes) {};
  rpc GetTestWithCtx(GetTestReq) returns (GetTestRes) {};
  rpc ThrowError(ThrowErrorReq) returns (GetTestRes) {};
  rpc LockResource(LockResourceReq) returns (GetTestRes) {};
  rpc EchoParams(EchoParamsReq) returns (EchoParamsRes) {};
}

service TestPrivate {
  rpc GetTestPrivate(GetTestReq) returns (GetTestRes) {};
}

message GetTestReq {
  int32 timeoutMs = 1;
}

message GetTestRes {
  string status = 1;
}

message ThrowErrorReq { 
  message ErrorData {
    optional string description = 2;
  }

  int32 httpStatus = 1;
  optional int32 processCode = 2;
  optional ErrorData data = 3;
  optional string type = 4; 
}

message LockResourceReq {
  string id = 1;
}

message EchoParamsReq {
  string name = 1;
  optional string nickname = 2;
  optional EchoNestedMsg nested = 3;
  repeated EchoNestedMsg items = 4;
}

message EchoNestedMsg {
  string value = 1;
  optional string extra = 2;
  optional EchoDeeplyNestedMsg deep = 3;
}

message EchoDeeplyNestedMsg {
  string id = 1;
  optional string label = 2;
}

message EchoParamsRes {
  string paramsJson = 1;
}
